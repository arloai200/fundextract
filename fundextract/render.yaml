services:
  - type: web
    name: fundextract
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://appsforoffice.microsoft.com,https://excel.officeapps.live.com"
    staticFiles:
      - path: /addin
        staticDir: addin
